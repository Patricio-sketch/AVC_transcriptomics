name: Check Environment

on:
  push:
    paths:
      - 'configurar_ambiente.R'
      - 'requirements.txt'
      - 'environment.yml'
      - '.github/workflows/check-environment.yml'
  pull_request:
    paths:
      - 'configurar_ambiente.R'
      - 'requirements.txt'
      - 'environment.yml'

permissions:
  contents: read

jobs:
  check-r:
    name: Validate R packages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.4'
      - name: Install BiocManager and packages
        run: Rscript configurar_ambiente.R
        env:
          BIOCMANAGER_VERSION: '3.19'

  check-python:
    name: Validate Python packages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Smoke test imports
        run: |
          python -c "
          import sentence_transformers, transformers, torch
          import pandas, numpy, sklearn, seaborn, matplotlib
          print('All Python packages imported successfully.')
          "

  check-conda-env:
    name: Validate conda environment.yml
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: conda-incubator/setup-miniconda@v3
        with:
          python-version: '3.11'
          activate-environment: avc_transcriptomics
          channels: conda-forge,defaults
      - name: Validate environment.yml syntax and resolve dependencies
        shell: bash -el {0}
        run: |
          conda env update --name avc_transcriptomics --file environment.yml --prune
          echo "Conda environment resolved successfully."
      - name: Smoke test conda environment imports
        shell: bash -el {0}
        run: |
          python -c "
          import pandas, numpy, sklearn, seaborn, matplotlib, torch
          print('All conda-installed packages imported successfully.')
          "
